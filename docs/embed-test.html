<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UGA Index Embed Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 24px;
        background: #f4f8f1;
        color: #111;
      }

      .wrap {
        max-width: 920px;
        margin: 0 auto;
      }

      .panel {
        margin-top: 20px;
        padding: 16px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 16px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>UGA Index Embed Test</h1>
      <p>Run the app locally, then open this file in a browser.</p>

      <section class="panel">
        <h2>Iframe cards</h2>
        <iframe
          src="http://localhost:3000/embed/cards?locale=en&theme=light&layout=cards"
          title="UGA Index"
          loading="lazy"
          style="width: 100%; height: 420px; border: 0; display: block;"
        ></iframe>
      </section>

      <section class="panel">
        <h2>Iframe chart</h2>
        <iframe
          src="http://localhost:3000/embed/chart?commodity=corn&locale=uk"
          title="UGA Index corn chart"
          loading="lazy"
          style="width: 100%; height: 340px; border: 0; display: block;"
        ></iframe>
      </section>

      <section class="panel">
        <h2>JavaScript loader</h2>
        <div id="uga-index-widget"></div>
        <script
          src="http://localhost:3000/embed/uga-index.js"
          data-target="#uga-index-widget"
          data-locale="en"
          data-theme="light"
          data-layout="compact"
        ></script>
      </section>
    </main>
  </body>
</html>
